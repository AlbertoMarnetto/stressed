# .github/workflows/build.yml
name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            qt_arch: win64_msvc2019_64
            artifact_name: build-windows
          - os: ubuntu-latest
            qt_arch: gcc_64
            artifact_name: build-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libxcb-cursor-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15'
          host: ${{ runner.os == 'Linux' && 'linux' || 'windows' }}
          target: 'desktop'
          arch: ${{ matrix.qt_arch }}

      - name: Configure (CMake)
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Bundle Qt
        if: runner.os == 'Windows'
        run: windeployqt build/src/app/Release/stressed.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/**/*.exe
            build/**/*.dll
            build/src/app/stressed
          if-no-files-found: warn
          retention-days: 14
