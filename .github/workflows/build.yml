# .github/workflows/build.yml
name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            qt_arch: win64_msvc2019_64
            artifact_name: build-windows
          - os: ubuntu-latest
            qt_arch: gcc_64
            artifact_name: build-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libxcb-cursor-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15'
          host: ${{ runner.os == 'Linux' && 'linux' || 'windows' }}
          target: 'desktop'
          arch: ${{ matrix.qt_arch }}

      - name: Configure (CMake)
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Bundle Qt for Windows
        if: runner.os == 'Windows'
        run: windeployqt build/src/app/Release/stressed.exe

      - name: Bundle Qt for Linux
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-*.AppImage
    
          # Extract linuxdeploy
          ./linuxdeploy-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy-appdir
          
          # Extract Qt plugin into linuxdeploy's plugin directory
          mkdir -p linuxdeploy-appdir/usr/plugins
          ./linuxdeploy-plugin-qt-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy-appdir/usr/plugins/linuxdeploy-plugin-qt
          
          # Make the plugin executable
          chmod +x linuxdeploy-appdir/usr/plugins/linuxdeploy-plugin-qt/AppRun
          
          # Install the plugin as a symlink so linuxdeploy finds it
          ln -sf ../plugins/linuxdeploy-plugin-qt/AppRun linuxdeploy-appdir/usr/bin/linuxdeploy-plugin-qt

          linuxdeploy-appdir/AppRun --appdir=build/deploy --executable=build/src/app/stressed --plugin qt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/**/*.exe
            build/**/*.dll
            build/src/app/stressed
            build/deploy/**/*
          if-no-files-found: warn
          retention-days: 14
